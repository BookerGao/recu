<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ticca支持与反馈</title>
  <style>
    :root {
      color-scheme: light dark;
      --brand: #2c5140;
      --text: #1c1c1e;
      --muted: #636366;
      --bg: #fbfbfa;
      --card: #ffffff;
      --line: rgba(44, 81, 64, 0.18);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --brand: #c2e0c9;
        --text: #f2f2f7;
        --muted: #aeaeb2;
        --bg: #101110;
        --card: #1c1d1c;
        --line: rgba(194, 224, 201, 0.22);
      }
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.72 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 44px 22px 56px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    h2 {
      margin: 30px 0 8px;
      font-size: 20px;
    }
    p {
      margin: 8px 0;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
    }
    a {
      color: var(--brand);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Ticca支持与反馈</h1>
    <p class="meta">我们会尽量让每张票据都被妥善留下。</p>
    <div class="panel">
      <p>如果你在拍摄、导入、裁切、保存或恢复购买时遇到问题，请在反馈中附上设备型号、iOS 版本、App 版本，以及问题出现前的操作步骤。</p>

      <h2>联系方式</h2>
      <p>邮件：<a href="mailto:ydgaoyolo@gmail.com?subject=Ticca%20%E6%94%AF%E6%8C%81%E4%B8%8E%E5%8F%8D%E9%A6%88">ydgaoyolo@gmail.com</a></p>

      <h2>常见问题</h2>
      <p><strong>票据保存在哪里？</strong><br>默认保存在 App 本地。开启“保存到相册”后，最终图片也会写入系统相册中的“Ticca”相册。</p>
      <p><strong>删除 App 后是否保留？</strong><br>App 本地数据会删除；已保存到“Ticca”相册的图片会保留。</p>
      <p><strong>如何恢复 Pro？</strong><br>打开升级页底部的“恢复购买”。</p>
    </div>
  </main>
</body>
</html>
